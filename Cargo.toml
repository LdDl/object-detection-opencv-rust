[dependencies]
lazy_static = "1.5.0"
ndarray = "0.17"

# OpenCV backend (dnn feature is added via opencv-backend feature flag to avoid conflicts with ORT)
opencv = { version = "0.96.0", default-features = false, features = ["imgcodecs", "imgproc"], optional = true }

# ORT (ONNX runtime) backend
ort = { version = "2.0.0-rc.12", optional = true }
image = { version = "0.25", optional = true }

# RKNN NPU backend
rknn-runtime = { version = "0.1.1", optional = true }

# TensorRT backend
tensorrt-infer = { version = "0.1.0", optional = true }
