[package]
name = "od_opencv"
repository = "https://github.com/LdDl/object-detection-opencv-rust"
readme = "README.md"
keywords = [
  "computer-vision",
  "object-detection",
  "yolo",
  "opencv",
  "onnx",
]
license = "MIT"
version = "0.8.2"
edition = "2024"
rust-version = "1.91.0"
authors = ["Dimitrii Lopanov <sexykdi@gmail.com>"]
exclude = ["/.github", "/ci", "/tools", "/scripts", "release.toml", "rustfmt.toml", "/images", "/pretrained"]
description = "Object detection utilities in Rust programming language for YOLO-based neural networks in OpenCV ecosystem"
homepage = "https://github.com/LdDl/object-detection-opencv-rust"
documentation = "https://docs.rs/od_opencv"
categories = [
  "algorithms",
  "multimedia",
  "computer-vision",
  "mathematics",
  "science",
]

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[features]
default = ["ort-backend"]

# Backend features - user should choose one
# opencv-backend adds the DNN module which conflicts with ORT static linking
opencv-backend = ["dep:opencv", "opencv/dnn"]
ort-backend = ["dep:ort", "dep:image"]

# GPU acceleration for ort-backend
ort-cuda-backend = ["ort-backend", "ort/cuda"]
ort-tensorrt-backend = ["ort-backend", "ort/tensorrt"]

# Compatibility layer: allows ORT backend to accept OpenCV Mat
# Note: This does NOT enable OpenCV's DNN module to avoid conflicts with ORT
ort-opencv-compat = ["ort-backend", "dep:opencv"]

# RKNN NPU backend (Rockchip RV1106 has been tested only)
rknn-backend = ["dep:rknn-runtime", "dep:image"]

# TensorRT backend (Jetson Nano, desktop NVIDIA GPUs)
tensorrt-backend = ["dep:image", "dep:tensorrt-infer"]

# Compatibility layer: allows TensorRT backend to accept OpenCV Mat
# Note: This does NOT enable OpenCV's DNN module to avoid conflicts
tensorrt-opencv-compat = ["tensorrt-backend", "dep:opencv"]

# Preprocessing options
letterbox = []

[lib]
name = "od_opencv"
path = "src/lib.rs"
doctest = false

